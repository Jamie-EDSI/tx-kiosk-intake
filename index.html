<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Intake App</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Intake queue">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">IA</div>
          <div>
            <p class="eyebrow">Intake workspace</p>
            <h1>Intake App</h1>
          </div>
        </div>

        <section class="metric-grid" aria-label="Daily intake metrics">
          <div class="metric">
            <span id="metricOpen">0</span>
            <p>Open</p>
          </div>
          <div class="metric">
            <span id="metricUrgent">0</span>
            <p>Urgent</p>
          </div>
          <div class="metric">
            <span id="metricAvg">0m</span>
            <p>Avg. review</p>
          </div>
        </section>

        <div class="queue-header">
          <h2>Queue</h2>
          <button class="ghost-button" id="resetDemo" type="button">Reset</button>
        </div>
        <div class="queue-list" id="queueList" role="list"></div>
      </aside>

      <section class="workspace" aria-label="Intake details">
        <header class="topbar">
          <div>
            <p class="eyebrow">Intake management</p>
            <h2>Capture, triage, and route new requests</h2>
          </div>
          <div class="status-chip" id="saveStatus" role="status">Ready</div>
        </header>

        <div class="content-grid">
          <form class="panel intake-form" id="intakeForm">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">New intake</p>
                <h3>Request details</h3>
              </div>
              <button class="primary-button" type="submit">Add intake</button>
            </div>

            <label>
              Name
              <input id="clientName" name="clientName" autocomplete="name" required placeholder="Jordan Lee">
            </label>

            <label>
              Email
              <input id="email" name="email" type="email" autocomplete="email" required placeholder="jordan@example.com">
            </label>

            <div class="field-row">
              <label>
                Request type
                <select id="requestType" name="requestType">
                  <option>Eligibility review</option>
                  <option>Document collection</option>
                  <option>Case update</option>
                  <option>New application</option>
                </select>
              </label>

              <label>
                Priority
                <select id="priority" name="priority">
                  <option>Standard</option>
                  <option>High</option>
                  <option>Urgent</option>
                </select>
              </label>
            </div>

            <label>
              Notes
              <textarea id="notes" name="notes" rows="5" required placeholder="Summarize what the person needs, any deadlines, and the next step."></textarea>
            </label>

            <div class="checklist" aria-label="Required materials">
              <label><input type="checkbox" name="materials" value="ID received"> ID received</label>
              <label><input type="checkbox" name="materials" value="Consent signed"> Consent signed</label>
              <label><input type="checkbox" name="materials" value="Proof uploaded"> Proof uploaded</label>
            </div>
          </form>

          <section class="panel detail-panel" aria-live="polite">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Selected intake</p>
                <h3 id="detailName">No intake selected</h3>
              </div>
              <span class="priority-pill" id="detailPriority">-</span>
            </div>

            <dl class="detail-list">
              <div>
                <dt>Email</dt>
                <dd id="detailEmail">-</dd>
              </div>
              <div>
                <dt>Type</dt>
                <dd id="detailType">-</dd>
              </div>
              <div>
                <dt>Status</dt>
                <dd id="detailStatus">-</dd>
              </div>
              <div>
                <dt>Materials</dt>
                <dd id="detailMaterials">-</dd>
              </div>
            </dl>

            <div class="notes-box">
              <p class="eyebrow">Notes</p>
              <p id="detailNotes">Choose a queue item or add a new intake.</p>
            </div>

            <div class="actions">
              <button class="secondary-button" id="advanceStatus" type="button">Advance status</button>
              <button class="ghost-button danger" id="removeIntake" type="button">Archive</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
